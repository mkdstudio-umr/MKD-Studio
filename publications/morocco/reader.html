<style>

}

*, *::before, *::after {

}

html, body {

/* ── PAGES ──────────────────────────────── */

.page {
  width: 100%; height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  background: var(--linen);

}

}
.page::after {

}

.page.plate {

/* ── MOBILE LAYOUT ─────────────────────── */
#mobile-wrap { position: fixed; inset: 0; }

.pg-enter-right { animation: pgInRight .46s cubic-bezier(.7,0,.2,1) both; }

.pg-exit-right  { animation: pgOutRight .46s cubic-bezier(.7,0,.2,1) both; }
@keyframes pgInRight  { from{transform:translateX(100%)} to{transform:translateX(0)} }
@keyframes pgInLeft   { from{transform:translateX(-100%)} to{transform:translateX(0)} }
@keyframes pgOutLeft  { from{transform:translateX(0)} to{transform:translateX(-100%)} }

/* ── CHROME ─────────────────────────────── */
#counter {

/* ── DESKTOP ─────────────────────────────── */
@media (min-width: 900px) {

  }
  #panel-right::before {

    top:0; left:0; width:24px; height:100%;
    background: linear-gradient(to right, rgba(0,0,0,.1), transparent);
    z-index: 4; pointer-events: none;
  }

  #panel-left .page, #panel-right .page {
    position: absolute; top:0; left:0; width:100%; height:100%;
  }

  #counter { bottom: 1.8rem; left: auto; right: 3.5vw; transform: none; }

  #btn-prev, #btn-next {
    position: fixed; top: 50%; transform: translateY(-50%);
    z-index: 40; background: none; border: none; cursor: pointer;
    color: rgba(176,171,166,.4); font-family: inherit;

  #btn-prev { left: .4vw; }
  #btn-next { right: .4vw; }
  #btn-prev:hover, #btn-next:hover { color: rgba(176,171,166,.85); }
}

@media (prefers-reduced-motion: reduce) {
  .pg-enter-right, .pg-enter-left,
  .pg-exit-left, .pg-exit-right { animation: none; }
}

<script>
const PAGES = [

/* 01 — COVER */
`<section class="page dark-page">
  <div class="cover-wrap">
    <div class="cover-title">Morocco</div>
    <div class="cover-subtitle">Place / Volume I</div>
    <div class="cover-location">Tangier &nbsp;&middot;&nbsp; Marrakech</div>

/* 02 — TITLE PAGE */
`<section class="page">
  <div class="title-wrap">
    <div class="title-main">Morocco</div>
    <div class="title-sub">Place, Volume I<br>Tangier &nbsp;&middot;&nbsp; Marrakech</div>
    <div class="title-studio">mkd STUDIO</div>
    <div class="title-note">A city at its own pace, and a palace that refuses to be anything less.</div>
  </div>
</section>`,

/* 03 — COLOPHON */
`<section class="page">
  <div class="colophon-wrap">
    <p>Photography and editorial direction</p>
    <p>mkd STUDIO</p>
    <hr class="col-rule">
    <p>Tangier, Morocco</p>
    <p>Marrakech, Morocco</p>
    <p>Photographed 2024 and 2025</p>
    <p>Published 2026</p>
    <hr class="col-rule">
    <p>All photography, editorial writing and publication design<br>are protected by copyright.</p>
    <p>No part of this publication may be reproduced<br>in any form without prior written permission.</p>
    <hr class="col-rule">
    <p>First edition &nbsp;&middot;&nbsp; 2026</p>
  </div>
</section>`,

/* 04 — INTRODUCTION */
`<section class="page">
  <div class="textwrap">
    <div class="section-label">Introduction</div>
    <p class="body">This publication is built from three studies made across two Moroccan cities.</p>
    <p class="body">Tangier first: the port city that has spent centuries being looked at by Europeans and has responded by remaining completely itself. Then Dar El Bacha in Marrakech: a historic palace converted into a coffee institution that treats the ritual of a cup of coffee as an argument about what beauty can mean inside a functional space.</p>
    <p class="body">The publication moves between these two registers without suggesting they are the same thing. Tangier is a city. Dar El Bacha is a room inside a city. The scale is different. The attention required is different. What they share is a quality that Morocco seems to produce reliably: the sense of a place that has existed long enough to stop needing to explain itself.</p>
    <p class="body i" style="margin-top:1.8rem;color:var(--mid)">Twenty-one photographs. Five sections. Two cities.</p>
  </div>
</section>`,

/* 05 — CHAPTER I */
`<section class="page">
  <div class="chapter-wrap">
    <div class="ch-num">I</div>
    <div class="ch-rule"></div>
    <div class="ch-name">Arrival</div>
  </div>

/* 06 — IMAGE: tng_01 (MATISSE plaque) */
`<section class="page plate">

</section>`,

/* 07 — ARRIVAL TEXT */
`<section class="page">
  <div class="textwrap">
    <div class="chapter-ref">I &nbsp;&middot;&nbsp; Arrival</div>
    <hr class="text-rule">
    <p class="body">Tangier arrives before you are ready for it. Not violently, but with a layering: French signage beside Arabic lettering, Art Deco facades giving way to Moorish archways, the smell of the Atlantic and the medina carried on the same wind.</p>
    <p class="body">Matisse was here. Delacroix was here. The city absorbed them as it absorbs everyone: not unchanged, but not transformed either. It continued to be Tangier. The brass plaque that marks where Matisse worked is not a monument. It is a footnote the city tolerates without particular interest.</p>
    <p class="body">This publication is not an inventory of famous presences. It is a study of what the city looks like when you stop moving through it and allow it to look back.</p>
  </div>
</section>`,

/* 08 — IMAGE: mor_boulevard (mosque boulevard) */
`<section class="page plate">
  <img src="/images/mor_boulevard.jpg" alt="Tangier, Morocco">
</section>`,

/* 09 — IMAGE: mor_artdeco (Art Deco building) */
`<section class="page plate">
  <img src="/images/mor_artdeco.jpg" alt="Tangier, Morocco">
</section>`,

/* 10 — CLOSING LINE I */
`<section class="page">
  <div class="closing-wrap">
    <p>A city built on more layers<br>than any single afternoon can reach.<br>The surface is the least of it.</p>
  </div>
</section>`,

/* 11 — CHAPTER II */
`<section class="page">
  <div class="chapter-wrap">
    <div class="ch-num">II</div>
    <div class="ch-rule"></div>
    <div class="ch-name">The City</div>
  </div>

/* 12 — IMAGE: tng2_05 (blue truck MURALLA arch) */
`<section class="page plate">
  <img src="/images/tng2_05.jpg" alt="Tangier, Morocco">
</section>`,

/* 13 — THE CITY TEXT */
`<section class="page">
  <div class="textwrap">
    <div class="chapter-ref">II &nbsp;&middot;&nbsp; The City</div>
    <hr class="text-rule">
    <p class="body">The medina operates independently of whoever is photographing it. A truck passes through a Roman arch trailing exhaust. A man in a djellaba walks directly toward the camera with no particular interest in it. Spices are sold in quantities that suggest a scale of daily life impossible to imagine from outside.</p>
    <p class="body">The photographic tradition of Morocco tends toward the picturesque: the colour-saturated souk, the choreographed portrait, the blue paint of Chefchaouen arranged for the lens. These photographs are not that. They are the city moving at its own pace, observed from a distance that respects the fact that Tangier does not need to perform.</p>
    <p class="body">The city exists at the intersection of histories: Phoenician port, Roman settlement, Arabic medina, French protectorate, international zone. Each layer is still legible in the fabric of the streets. None of them explains the others.</p>
  </div>
</section>`,

`<section class="page plate">

</section>`,

/* 16 — IMAGE: tng2_06 (spice sacks) */

/* 17 — IMAGE: tng_10 (bilingual books) */

</section>`,

/* 18 — CLOSING LINE II */
`<section class="page">

    <p>The city moves at its own pace.<br>The camera holds still<br>and waits for it.</p>
  </div>

/* 19 — CHAPTER III */
`<section class="page">

/* 21 — INTERIORS TEXT */
`<section class="page">
  <div class="textwrap">
    <div class="chapter-ref">III &nbsp;&middot;&nbsp; Interiors</div>
    <hr class="text-rule">
    <p class="body">Inside, Tangier is quieter. The riad interior absorbs the noise of the street and converts it: not silence exactly, but a different quality of attention that the architecture seems designed to produce.</p>
    <p class="body">Zellige on a column. Carved plaster above an arch. A wicker chair in morning light on a terrazzo floor where the shadows from a courtyard tree shift across the day. These things do not announce themselves. They are legible only to whoever is willing to stay long enough.</p>
    <p class="body">The interior is where a city's private life is conducted. The street is performance and commerce and movement. The courtyard is where the city exhales. The two registers are in close proximity and largely do not notice each other.</p>
  </div>
</section>`,

`<section class="page">

    <div class="chapter-ref">IV &nbsp;&middot;&nbsp; Evening</div>
    <hr class="text-rule">
    <p class="body">Evening is the city&rsquo;s most honest hour. The restaurant fills without spectacle. Candles are lit in the candlestick holders as if this has been done the same way for a long time, because it has. Terracotta walls hold the warmth of a day that is no longer there.</p>
    <p class="body">The light becomes something the city uses. It is not atmospheric in the way that photographers seek atmosphere: it is simply what happens to light in rooms that were built before electricity and have not entirely agreed to the substitution.</p>
    <p class="body">After the restaurants, the sea. A figure stands on the rocks at dusk, alone with the headland and the Atlantic. The amber sky holds its colour for exactly long enough. Tangier at this hour is private, and the photographs taken from this distance carry the weight of a city that does not require an audience to be fully itself.</p>

    <p class="body">Dar El Bacha is something else entirely.</p>
    <p class="body">In Marrakech, inside the historic palace that has been converted into one of the most considered coffee environments in the world, the registers shift. The approach through a Moorish arch opens onto a colonnade of zellige-tiled columns, each one different in palette, each one more detailed than the last. The floor is marble. The ceiling carries the mark of craftsmen who understood patience as a professional requirement.</p>
    <p class="body">Inside, the coffee ritual is conducted with a formality that has nothing to do with pretension and everything to do with care. Amber tins arranged in a wall of perfect repetition. A server in white and red who smiles because he means it. A coffee cup on a round table, the word COFFEE printed as if anyone who arrived here needed reminding.</p>
    <p class="body">This is not a caf&eacute;. It is an argument about what a cup of coffee can mean when it is placed inside something that was already beautiful before the coffee arrived.</p>

    <p class="body">Morocco rewards the kind of attention that is willing to be patient. Not the attention of a tourist in a hurry, but the attention of someone who has sat down, ordered something, and decided to stay until the light changes.</p>
    <p class="body">These photographs were made across three separate studies. They do not document a country. They hold fragments of two cities and a single room that together suggest something about how Morocco carries itself: without effort, without explanation, and without any particular interest in whether you understand it or not.</p>

const N = PAGES.length;
let cur = 0;
let busy = false;
let cTimer;

const mPanel  = document.getElementById('mobile-panel');
const pLeft   = document.getElementById('panel-left');
const pRight  = document.getElementById('panel-right');
const counter = document.getElementById('counter');
const btnPrev = document.getElementById('btn-prev');
const btnNext = document.getElementById('btn-next');

const isDesk = () => window.innerWidth >= 900;

function inject(el, idx) {
  if (!el) return;
  if (idx < 0 || idx >= N) {
    el.innerHTML = '';
    el.style.background = 'var(--linen)';
    return;
  }
  el.innerHTML = PAGES[idx];
  const pg = el.querySelector('.page');
  const isDark = pg && (pg.classList.contains('plate') || pg.classList.contains('dark-page'));
  el.style.background = isDark ? 'var(--dark)' : 'var(--linen)';
}

function tick(n) {
  counter.textContent = n + ' / ' + N;
  counter.classList.remove('fade');
  counter.classList.add('show');
  clearTimeout(cTimer);
  cTimer = setTimeout(() => counter.classList.add('fade'), 2400);
}

function renderDesk(idx) {
  const left = idx % 2 === 0 ? idx : idx - 1;
  cur = Math.max(0, Math.min(N - 1, left));
  inject(pLeft,  cur);
  inject(pRight, cur + 1 < N ? cur + 1 : -1);
  tick(cur + 1);
}

function renderMobile(idx) {
  cur = Math.max(0, Math.min(N - 1, idx));
  inject(mPanel, cur);
  tick(cur + 1);
}

function slide(dir, newIdx) {
  if (busy) return;
  busy = true;
  const out = mPanel.cloneNode(true);
  out.style.cssText = 'position:absolute;inset:0;z-index:3;';
  document.getElementById('mobile-wrap').appendChild(out);
  inject(mPanel, newIdx);
  cur = newIdx;
  tick(cur + 1);
  const inCls  = dir === 'next' ? 'pg-enter-right' : 'pg-enter-left';
  const outCls = dir === 'next' ? 'pg-exit-left'   : 'pg-exit-right';
  mPanel.style.animation = 'none';
  void mPanel.offsetWidth;
  mPanel.classList.add(inCls);
  out.classList.add(outCls);
  setTimeout(() => {
    out.remove();
    mPanel.classList.remove(inCls);
    busy = false;
  }, 480);
}

function next() {
  if (isDesk()) { renderDesk(cur + 2); }
  else { if (cur < N - 1) slide('next', cur + 1); }
}
function prev() {
  if (isDesk()) { renderDesk(cur - 2); }
  else { if (cur > 0) slide('prev', cur - 1); }
}

function enter() {
  document.getElementById('intro').classList.add('gone');
  setTimeout(() => document.getElementById('hint').classList.add('gone'), 3500);
  if (isDesk()) {
    btnPrev.style.display = btnNext.style.display = 'block';
    renderDesk(0);
  } else {
    renderMobile(0);
  }
}

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); next(); }
  if (e.key === 'ArrowLeft') { e.preventDefault(); prev(); }
});

let sx = 0, sy = 0;
document.addEventListener('touchstart', e => {
  sx = e.touches[0].clientX; sy = e.touches[0].clientY;
}, {passive:true});
document.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - sx;
  const dy = e.changedTouches[0].clientY - sy;
  if (Math.abs(dx) > 40 && Math.abs(dx) > Math.abs(dy))
    dx < 0 ? next() : prev();
}, {passive:true});

let wasDesk = isDesk();
window.addEventListener('resize', () => {
  const now = isDesk();
  if (now !== wasDesk) {
    wasDesk = now;
    btnPrev.style.display = btnNext.style.display = now ? 'block' : 'none';
    if (now) renderDesk(cur);
    else renderMobile(cur);
  }
});
</script>
