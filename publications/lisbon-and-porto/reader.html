*, *::before, *::after {

/* ── PAGES ──────────────────────────────── */

#mobile-wrap { position: fixed; inset: 0; }

  #counter { bottom: 1.8rem; left: auto; right: 3.5vw; transform: none; }

  #btn-prev, #btn-next {
    position: fixed; top: 50%; transform: translateY(-50%);
    z-index: 40; background: none; border: none; cursor: pointer;
    color: rgba(176,171,166,.4); font-family: inherit;

  #btn-next { right: .4vw; }
  #btn-prev:hover, #btn-next:hover { color: rgba(176,171,166,.85); }
}

@media (prefers-reduced-motion: reduce) {

`<section class="page dark-page">

`<section class="page">

    <hr class="col-rule">

    <p>No part of this publication may be reproduced<br>in any form without prior written permission.</p>

  </div>

/* 04 — INTRODUCTION */
`<section class="page">
  <div class="textwrap">
    <div class="section-label">Introduction</div>
    <p class="body">This publication is built from two studies made in two Portuguese cities, separated by three hours of motorway and centuries of shared history.</p>
    <p class="body">Lisbon comes first: the capital arranged across seven hills above the Tagus estuary, wide enough at its mouth to be mistaken for the sea. The city has a quality of light that painters have been writing about since the eighteenth century and that the camera confirms without improving. Then Porto: smaller, steeper, built around the Douro river and the industry of port wine, with an interior life that the tourist circuit tends to miss entirely.</p>
    <p class="body">The two cities are not the same. What they share is a quality of accumulated time that shows up differently in each place: in Lisbon as an elegance that has been lived in too long to be precious; in Porto as a pride that has never needed outside confirmation.</p>
    <p class="body i" style="margin-top:1.8rem;color:var(--mid)">Nineteen photographs. Five sections. Two cities.</p>

`<section class="page">

/* 07 — THE ATLANTIC EDGE TEXT */
`<section class="page">
  <div class="textwrap">
    <div class="chapter-ref">I &nbsp;&middot;&nbsp; The Atlantic Edge</div>
    <hr class="text-rule">
    <p class="body">Portugal ends at the water. Not gradually, but with the abruptness of a country that has spent five centuries orienting itself toward the ocean and has not yet entirely decided to stop.</p>
    <p class="body">The beach at the edge of Lisbon in the last light of the day holds this ambivalence clearly: the dark sand, the white foam of a wave that has travelled from somewhere the map does not name, the weight of the water against the quiet of the shore. It is not dramatic. It is the ordinary ending of an ordinary afternoon, and that is precisely its quality.</p>
    <p class="body">On the Tagus, a catamaran passes in the dusk. The river is wide enough here to read as open sea, the pink sky holding its last colour above a boat that moves without apparent urgency toward the far bank or perhaps further. From the city above, the water looks like something the city was built to watch.</p>
  </div>
</section>`,

/* 10 — CHAPTER II */
`<section class="page">

/* 12 — LISBON TEXT */
`<section class="page">
  <div class="textwrap">
    <div class="chapter-ref">II &nbsp;&middot;&nbsp; Lisbon</div>
    <hr class="text-rule">
    <p class="body">The city is arranged for the vertical as much as the horizontal. Streets drop away without warning. Viewpoints appear at the end of alleys that seem to lead nowhere. The medieval quarter of the Alfama is built on a hill above the river in a way that makes navigation unreliable and the experience of being lost not entirely unpleasant.</p>
    <p class="body">Inside the cathedral cloisters, azulejos panels cover walls that were already standing before the tiles arrived. The blue-and-white tilework is Portugal&rsquo;s most immediately recognisable contribution to its own visual culture, but it is worth pausing on what the tiles do inside a Gothic cloister: they apply a domestic warmth to an austere structure, insisting on decoration where the architecture argues for restraint. The argument is unresolved and has been running for three centuries.</p>
    <p class="body">On Rua Augusta, a street sign in marble announces itself without particular excitement. The marble is weathered. The lettering is exact. The city has been naming its streets for long enough that the signs have become indistinguishable from the buildings they are attached to.</p>
  </div>
</section>`,

`<section class="page">

/* 20 — THE CROSSING TEXT */
`<section class="page">
  <div class="textwrap">
    <div class="chapter-ref">III &nbsp;&middot;&nbsp; The Crossing</div>
    <hr class="text-rule">
    <p class="body">The Douro arrives at Porto after travelling five hundred kilometres from the Spanish interior. By the time it reaches the city it is wide and dark and moving with the authority of a river that has already done most of its work. The rabelo boats that once carried port wine barrels downstream from the Douro Valley now sit moored below the Dom Lu&iacute;s bridge as a form of civic decoration, though the form of the boat has not changed significantly in two hundred years.</p>
    <p class="body">From above, looking down at the quayside, the yellow hull of a rabelo against the dark green water is the kind of image that appears without arrangement and disappears before you have finished looking at it. This is a characteristic of Porto: the city presents itself suddenly and at angles you were not expecting.</p>
    <p class="body">The Vila Nova de Gaia waterfront on the south bank holds the port wine lodges in a dense row: Sandeman, Fonseca, Dow&rsquo;s, names that appear in the histories of two countries and continue to operate from buildings that face the river as if the river were still the point.</p>
  </div>
</section>`,

    <div class="chapter-ref">IV &nbsp;&middot;&nbsp; Porto</div>
    <hr class="text-rule">
    <p class="body">Porto operates at a different register from Lisbon. The capital produces beauty that has been polished over time. Porto produces beauty that has not entirely agreed to be looked at.</p>
    <p class="body">At Manteigaria on the Rua Alexandre Herculano, past&eacute;is de nata cool on a steel tray behind glass while the staff work the counter with the efficiency of an operation that does one thing and does it with conviction. The film photograph of the shopfront, the white facade and the gold lettering, holds the quality of a place that has not changed its mind about what it is.</p>
    <p class="body">Inside the Livraria Lello, the famous bookshop on the Rua das Carmelitas, the carved wooden staircase rises toward a stained glass ceiling in shades of red and blue and gold. Two figures browse below: one adult, one child. The books spread across the table between them include several editions of Harry Potter in several languages, which is the condition of the most celebrated bookshop in Portugal in the present moment. The staircase makes no comment on this. It has seen worse.</p>
  </div>
</section>`,

`<section class="page">

    <div class="chapter-ref">V &nbsp;&middot;&nbsp; After the River</div>
    <hr class="text-rule">
    <p class="body">The golden hour in Porto is not the polite golden hour of Mediterranean cities. It is something more direct: the sun drops behind the hills of Vila Nova de Gaia and throws the entire city into silhouette against a sky that has not yet agreed to become evening. The Douro holds the colour on its surface for longer than seems natural.</p>
    <p class="body">On the upper tier of the Dom Lu&iacute;s bridge, the Metro do Porto crosses above the pedestrian walkway at this hour with the Igreja da Serra do Pilar behind it on the hill, the white dome that has stood on the south bank since 1547 and has watched the bridge being built below it, completed in 1886, without any visible opinion on the matter.</p>
    <p class="body">The two cities in this publication share the same river at different distances from its mouth. Lisbon is where the Tagus ends. Porto is where the Douro ends. Two endings. Two different ways of standing at the edge of the same country and looking out at the same ocean from different angles.</p>

`<section class="page">

    <p class="body">Portugal is a small country with a long memory. The two cities in this publication carry that memory differently: Lisbon in its monuments and its light, Porto in its river and its insistence on continuing to work.</p>
    <p class="body">These nineteen photographs were made across two separate studies. They do not document a country. They hold fragments of two cities that together suggest something about the quality of a place that has had enough time to become entirely itself.</p>
    <p class="body">The Atlantic at the end of the beach in Lisbon and the Douro at golden hour in Porto are the same water at different stages of the same journey. The photographs do not draw this connection. They simply hold the two moments at either end of the trip and allow you to make of them what you will.</p>

const N = PAGES.length;
let cur = 0;
let busy = false;
let cTimer;

const mPanel  = document.getElementById('mobile-panel');
const pLeft   = document.getElementById('panel-left');
const pRight  = document.getElementById('panel-right');
const counter = document.getElementById('counter');
const btnPrev = document.getElementById('btn-prev');
const btnNext = document.getElementById('btn-next');

const isDesk = () => window.innerWidth >= 900;

function inject(el, idx) {
  if (!el) return;
  if (idx < 0 || idx >= N) {
    el.innerHTML = '';
    el.style.background = 'var(--linen)';
    return;
  }
  el.innerHTML = PAGES[idx];
  const pg = el.querySelector('.page');
  const isDark = pg && (pg.classList.contains('plate') || pg.classList.contains('dark-page'));
  el.style.background = isDark ? 'var(--dark)' : 'var(--linen)';
}

function tick(n) {
  counter.textContent = n + ' / ' + N;
  counter.classList.remove('fade');
  counter.classList.add('show');
  clearTimeout(cTimer);
  cTimer = setTimeout(() => counter.classList.add('fade'), 2400);
}

function renderDesk(idx) {
  const left = idx % 2 === 0 ? idx : idx - 1;
  cur = Math.max(0, Math.min(N - 1, left));
  inject(pLeft,  cur);
  inject(pRight, cur + 1 < N ? cur + 1 : -1);
  tick(cur + 1);
}

function renderMobile(idx) {
  cur = Math.max(0, Math.min(N - 1, idx));
  inject(mPanel, cur);
  tick(cur + 1);
}

function slide(dir, newIdx) {
  if (busy) return;
  busy = true;
  const out = mPanel.cloneNode(true);
  out.style.cssText = 'position:absolute;inset:0;z-index:3;';
  document.getElementById('mobile-wrap').appendChild(out);
  inject(mPanel, newIdx);
  cur = newIdx;
  tick(cur + 1);
  const inCls  = dir === 'next' ? 'pg-enter-right' : 'pg-enter-left';
  const outCls = dir === 'next' ? 'pg-exit-left'   : 'pg-exit-right';
  mPanel.style.animation = 'none';
  void mPanel.offsetWidth;
  mPanel.classList.add(inCls);
  out.classList.add(outCls);
  setTimeout(() => {
    out.remove();
    mPanel.classList.remove(inCls);
    busy = false;
  }, 480);
}

function next() {
  if (isDesk()) { renderDesk(cur + 2); }
  else { if (cur < N - 1) slide('next', cur + 1); }
}
function prev() {
  if (isDesk()) { renderDesk(cur - 2); }
  else { if (cur > 0) slide('prev', cur - 1); }
}

function enter() {
  document.getElementById('intro').classList.add('gone');
  setTimeout(() => document.getElementById('hint').classList.add('gone'), 3500);
  if (isDesk()) {
    btnPrev.style.display = btnNext.style.display = 'block';
    renderDesk(0);
  } else {
    renderMobile(0);
  }
}

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); next(); }
  if (e.key === 'ArrowLeft') { e.preventDefault(); prev(); }
});

let sx = 0, sy = 0;
document.addEventListener('touchstart', e => {
  sx = e.touches[0].clientX; sy = e.touches[0].clientY;
}, {passive:true});
document.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - sx;
  const dy = e.changedTouches[0].clientY - sy;
  if (Math.abs(dx) > 40 && Math.abs(dx) > Math.abs(dy))
    dx < 0 ? next() : prev();
}, {passive:true});

let wasDesk = isDesk();
window.addEventListener('resize', () => {
  const now = isDesk();
  if (now !== wasDesk) {
    wasDesk = now;
    btnPrev.style.display = btnNext.style.display = now ? 'block' : 'none';
    if (now) renderDesk(cur);
    else renderMobile(cur);
  }
});
</script>
